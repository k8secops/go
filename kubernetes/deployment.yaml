apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-catalog
  namespace: demo
  labels:
    app: go-catalog
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-catalog
  template:
    metadata:
      labels:
        app: go-catalog
        tier: backend
    spec:
      containers:
        - name: go-catalog
          image: k8secops/go:go-main-0000019f-20260628-063206 # {"$imagepolicy": "flux-system:demo-go"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
